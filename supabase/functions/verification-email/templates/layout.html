<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{Subject}}</title>
    <style>
      @media screen and (max-width: 480px) {
        .email-shell {
          width: 100% !important;
        }

        .email-padding {
          padding-left: 28px !important;
          padding-right: 28px !important;
        }

        .body-title {
          font-size: 22px !important;
          line-height: 30px !important;
        }

        .button {
          width: 100% !important;
        }
      }

      @media (prefers-color-scheme: dark) {
        .logo-light {
          display: none !important;
        }

        .logo-dark {
          display: block !important;
        }
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background: #ffffff">
    <div
      style="
        display: none;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        color: transparent;
        line-height: 1px;
        mso-hide: all;
      "
    >
      {{Preheader}}
    </div>

    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      border="0"
      style="background: #ffffff; border-collapse: collapse; font-family: Satoshi, Arial, Helvetica, sans-serif"
    >
      <tr>
        <td style="height: 8px; background: #f2e640; font-size: 0; line-height: 0">&nbsp;</td>
      </tr>
      <tr>
        <td align="center">
          <table
            class="email-shell"
            role="presentation"
            width="680"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="width: 680px; max-width: 100%; border-collapse: collapse; background: #ffffff"
          >
            <tr>
              <td class="email-padding" style="padding: 54px 48px 40px">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td align="center" style="padding-bottom: 42px">
                      <img
                        class="logo-light"
                        alt="Konektado"
                        src="https://dudlohdeydcbsvgccexd.supabase.co/storage/v1/object/public/brand/konektado-logo.png"
                        width="228"
                        style="display: block; width: 228px; max-width: 100%; height: auto; border: 0"
                      />
                      <img
                        class="logo-dark"
                        alt="Konektado"
                        src="https://dudlohdeydcbsvgccexd.supabase.co/storage/v1/object/public/brand/konektado-logo-light.png"
                        width="228"
                        style="display: none; width: 228px; max-width: 100%; height: auto; border: 0"
                      />
                      <div
                        style="
                          padding-top: 4px;
                          font-size: 12px;
                          line-height: 16px;
                          color: #333333;
                          font-weight: 400;
                        "
                      >
                        Kapitbahay. Kabuhayan. Konektado.
                      </div>
                    </td>
                  </tr>

                  {{Content}}

                  <tr>
                    <td style="padding-top: 32px">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse: collapse">
                        <tr>
                          <td align="center">
                            <a
                              class="button"
                              href="{{CTA URL}}"
                              style="
                                display: inline-block;
                                min-width: 212px;
                                padding: 14px 24px;
                                background: #0d99ff;
                                border-radius: 6px;
                                color: #ffffff;
                                font-size: 14px;
                                line-height: 20px;
                                font-weight: 700;
                                text-decoration: none;
                                text-align: center;
                              "
                            >
                              {{CTA Label}}
                            </a>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>

                  <tr>
                    <td style="padding-top: 28px">
                      <p
                        style="
                          margin: 0;
                          padding: 0;
                          font-size: 12px;
                          line-height: 19px;
                          color: #54606a;
                        "
                      >
                        {{Footer}}
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
